<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Set Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <header>
      <h1>Gym Set Tracker 🏋️</h1>
      <p>Log your sets, never forget a past weight.</p>
    </header>

    <section class="card form-container">
      <h2 id="formTitle">Log a New Set</h2>
      <form id="setForm">
        <input type="hidden" id="setId">
        
        <div class="form-group">
          <label for="exercise">Exercise Name</label>
          <input type="text" id="exercise" placeholder="e.g. Bench Press" required>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="weight">Weight (kg/lbs)</label>
            <input type="number" id="weight" step="0.5" placeholder="e.g. 60.5" required>
          </div>
          <div class="form-group">
            <label for="reps">Reps</label>
            <input type="number" id="reps" placeholder="e.g. 10" required>
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required>
          </div>
        </div>

        <div class="button-group">
          <button type="submit" id="submitBtn">Log Set</button>
          <button type="button" id="cancelEditBtn" class="hidden outline-btn">Cancel Edit</button>
        </div>
      </form>
    </section>

    <section class="card logs-container">
      <h2>My Sets</h2>
      <div id="loading" class="status-msg loading">Loading sets from server... <span class="spinner"></span></div>
      <div id="error" class="status-msg error hidden">Failed to connect to the backend server.</div>
      
      <div class="table-responsive">
        <table id="setsTable" class="hidden">
          <thead>
            <tr>
              <th>Date</th>
              <th>Exercise</th>
              <th>Weight</th>
              <th>Reps</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="setsBody">
            <!-- Data will be loaded here -->
          </tbody>
        </table>
      </div>
      <div id="emptyState" class="status-msg empty hidden">No sets logged yet. Let's make some gains!</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
